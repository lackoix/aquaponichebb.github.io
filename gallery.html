<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aquaponics Club</title>
    <style>
        body { font-family: sans-serif; background: #f9f9f9; padding: 20px; margin: 0; }
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; max-width: 1000px; margin: 0 auto; }
        .card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }
        .img-placeholder { height: 200px; background: #eee; display: flex; align-items: center; justify-content: center; border-radius: 8px; }
        
        /* Lightbox Styles */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); z-index: 1000; justify-content: center; align-items: center; flex-wrap: wrap; overflow-y: auto; }
        #lightbox img { max-width: 80%; margin: 10px; border-radius: 8px; }
        .close { position: fixed; top: 20px; right: 30px; color: white; font-size: 40px; cursor: pointer; }
        .wip-text { color: white; font-size: 2rem; }
    </style>
</head>
<body>

    <div class="folder-grid">
        <div class="card" onclick="openLightbox(['https://imgur.com/a/ujWoLpD', 'https://imgur.com/a/4xNTnHB'])">
            <h2>📂 Club Activities</h2>
            <div class="img-placeholder">Click to view photos</div>
        </div>

        <div class="card" onclick="openLightbox(['https://imgur.com/a/53R5vsT', 'https://imgur.com/a/6oJp1LQ'])">
            <h2>👥 Members & Team</h2>
            <div class="img-placeholder">Click to view photos</div>
        </div>

        <div class="card" onclick="openLightbox(['https://imgur.com/a/Jm77mlV','https://imgur.com/a/pcl7Q4b'])"> <h2>🛠️ System & Tech</h2>
            <div class="img-placeholder">Click to view photos</div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <div id="lightbox-content"></div>
    </div>

    <script>
        function openLightbox(images) {
            const container = document.getElementById('lightbox-content');
            container.innerHTML = ''; // Clear previous
            
            if (images.length === 0) {
                container.innerHTML = '<div class="wip-text">🚧 Work In Progress</div>';
            } else {
                images.forEach(src => {
                    container.innerHTML += `<img src="${src}">`;
                });
            }
            document.getElementById('lightbox').style.display = 'flex';
        }
    </script>
</body>
</html>
