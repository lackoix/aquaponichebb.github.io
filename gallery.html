<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gallery | Aquaponics Club</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f7f6; margin: 0; padding: 0; }
        
        /* Header */
        header { 
            background-color: #1b4332; 
            padding: 20px; 
            text-align: center; 
            width: 100%;
        }
        header a { 
            color: #d8f3dc; 
            text-decoration: none; 
            font-size: 1.5rem; 
            font-weight: bold; 
        }

        /* Folder Grid */
        .folder-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; max-width: 1000px; margin: 20px auto; padding: 0 20px; }
        .card { background: #fff; padding: 20px; border-radius: 12px; border: 1px solid #ddd; cursor: pointer; }
        
        .ss-container { height: 200px; position: relative; border-radius: 8px; overflow: hidden; background: #eee; }
        .slide { position: absolute; width: 100%; height: 100%; object-fit: cover; opacity: 0; transition: opacity 1s; }
        .slide.active { opacity: 1; }

        /* Lightbox - Grid Collage */
        #lightbox { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 1000; padding: 60px 20px; overflow-y: auto; }
        #lightbox-content { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; max-width: 1000px; margin: 0 auto; }
        #lightbox-content img { width: 100%; height: 250px; object-fit: cover; border-radius: 8px; cursor: pointer; }
        .close { position: fixed; top: 20px; right: 20px; color: white; font-size: 40px; cursor: pointer; z-index: 1001; }

        /* --- Easter Egg Animation --- */
        @keyframes swayDance {
            0% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); }
            50% { transform: translate(-50%, -50%) rotate(15deg) scale(1.1); }
            100% { transform: translate(-50%, -50%) rotate(-15deg) scale(1); }
        }
        .dancing-egg {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            max-width: 300px;
            max-height: 300px;
            z-index: 9999;
            pointer-events: auto;
            cursor: pointer;
            animation: swayDance 1.2s ease-in-out infinite;
            box-shadow: none; /* Removed the shadow that created the border effect */
            border-radius: 15px;
            border: none;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html">← Back to Home</a>
    </header>

    <div class="folder-grid">
        <div class="card" onclick="openLightbox(['https://i.imgur.com/h8l9ch7.jpeg', 'https://i.imgur.com/PmQ9skh.jpeg'])">
            <h2>📂 Club Activities</h2>
            <div class="ss-container" id="ss1">
                <img class="slide active" src="https://i.imgur.com/h8l9ch7.jpeg">
                <img class="slide" src="https://i.imgur.com/PmQ9skh.jpeg">
            </div>
        </div>

        <div class="card" onclick="openLightbox(['https://i.imgur.com/tGdPGd0.jpeg', 'https://i.imgur.com/sDSAy6j.jpeg','https://i.imgur.com/KfmPwA5.png','https://i.imgur.com/0Vybwjz.png','https://i.imgur.com/d3YDvPq.png'])">
            <h2>👥 Members & Team</h2>
            <div class="ss-container" id="ss2">
                <img class="slide active" src="https://i.imgur.com/tGdPGd0.jpeg">
                <img class="slide" src="https://i.imgur.com/sDSAy6j.jpeg">
                <img class="slide" src="https://i.imgur.com/KfmPwA5.png">
                <img class="slide" src="https://i.imgur.com/0Vybwjz.png">
                <img class="slide" src="https://i.imgur.com/d3YDvPq.png">
            </div>
        </div>

        <div class="card" onclick="openLightbox(['https://i.imgur.com/g3efDAd.jpeg','https://i.imgur.com/iF6EgXb.jpeg'])">
            <h2>🛠️ System & Tech</h2>
            <div class="ss-container" id="ss3">
                <img class="slide active" src="https://i.imgur.com/g3efDAd.jpeg">
                <img class="slide" src="https://i.imgur.com/iF6EgXb.jpeg">
            </div>
        </div>
    </div>

    <div id="lightbox" onclick="this.style.display='none'">
        <span class="close">&times;</span>
        <div id="lightbox-content"></div>
    </div>

    <script>
        // Slideshow Engine
        function startSS(id) {
            let container = document.getElementById(id);
            if(!container) return;
            let slides = container.querySelectorAll('.slide');
            let i = 0;
            setInterval(() => {
                slides[i].classList.remove('active');
                i = (i + 1) % slides.length;
                slides[i].classList.add('active');
            }, 3000);
        }
        startSS('ss1'); startSS('ss2'); startSS('ss3');

        // Lightbox Engine
        function openLightbox(images) {
            const container = document.getElementById('lightbox-content');
            container.innerHTML = images.map(src => `<img src="${src}" onclick="event.stopPropagation()">`).join('');
            document.getElementById('lightbox').style.display = 'block';
        }

        /* --- Combined Hybrid Easter Egg Trigger --- */
        const targetSequence = ['l', 'a', 'b', 'u', 'h', 'e', 'e'];
        let currentSequence = [];

        // 1. Desktop Track: Keyboard Sequence Matcher
        window.addEventListener("keydown", (e) => {
            const key = e.key.toLowerCase(); 
            currentSequence.push(key);
            
            if (currentSequence.length > targetSequence.length) {
                currentSequence.shift();
            }

            if (JSON.stringify(currentSequence) === JSON.stringify(targetSequence)) {
                triggerEasterEgg();
                currentSequence = []; 
            }
        });

        // 2. Mobile Track: Background Press-and-Hold (3 Seconds)
        let pressTimer;
        window.addEventListener("mousedown", startPress);
        window.addEventListener("touchstart", startPress, { passive: true });
        window.addEventListener("mouseup", cancelPress);
        window.addEventListener("touchend", cancelPress);

        function startPress(e) {
            if (e.target.closest('.card') || e.target.closest('header') || e.target.closest('#lightbox')) return;
            
            pressTimer = window.setTimeout(() => {
                triggerEasterEgg();
            }, 3000); 
        }

        function cancelPress() {
            clearTimeout(pressTimer);
        }

        // Execution Logic
        function triggerEasterEgg() {
            if (document.getElementById("easter-egg-pic")) return;

            let img = document.createElement("img");
            img.src = "https://i.imgur.com/ZsOgoZP.png"; 
            img.className = "dancing-egg";
            img.id = "easter-egg-pic";
            img.title = "Click me to dismiss!";

            img.addEventListener("click", () => {
                img.remove();
            });

            document.body.appendChild(img);
        }
    </script>
</body>
</html>
